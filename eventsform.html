
<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Events Entry | Demo Company Ltd.</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        /* Neumorphic UI Utility Classes */
        .neu-flat {
            background: #f7f9ff;
            box-shadow: 12px 12px 24px #d1dbe7, -12px -12px 24px #ffffff;
        }
        .neu-pressed {
            background: #f7f9ff;
            box-shadow: inset 8px 8px 16px #d1dbe7, inset -8px -8px 16px #ffffff;
        }
        .neu-card {
            background: #f7f9ff;
            box-shadow: 10px 10px 20px #d1dbe7, -10px -10px 20px #ffffff;
        }
        .neu-button {
            background: #5c5f61;
            box-shadow: 6px 6px 12px #d1dbe7, -6px -6px 12px #ffffff;
            transition: all 0.2s ease;
        }
        .neu-button:active {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2);
            transform: scale(0.98);
        }
        .input-field {
            background: #f7f9ff;
            box-shadow: inset 4px 4px 8px #d1dbe7, inset -4px -4px 8px #ffffff;
            border: none;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            box-shadow: inset 2px 2px 4px #d1dbe7, inset -2px -2px 4px #ffffff;
            ring: none;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#5c5f61",
                      "secondary": "#505f76",
                      "background": "#f7f9ff",
                      "on-background": "#131d25",
                      "on-surface-variant": "#44474a",
                      "surface-container-high": "#dfe9f5",
                      "outline": "#74777a"
              },
              "spacing": {
                      "stack-md": "24px",
                      "section-gap": "80px",
                      "container-max": "1024px"
              }
            },
          },
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen p-6 md:p-12">
    <div class="max-w-2xl mx-auto">
        <!-- Back Button -->
        <a href="index.html" class="inline-flex items-center gap-2 text-primary font-semibold mb-12 hover:opacity-70 transition-opacity">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Back to Home</span>
        </a>

        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-primary mb-2">Demo Company Ltd.</h1>
            <p class="text-on-surface-variant text-lg">Entry Your Events of Business Today</p>
        </div>

        <!-- Form Container -->
        <div class="neu-card p-8 md:p-10 rounded-3xl">
            <form id="eventForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Year -->
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2 ml-1">Year</label>
                        <input type="number" name="year" placeholder="2026" required
                            class="input-field w-full px-5 py-3 rounded-xl text-on-background">
                    </div>
                    <!-- Month -->
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2 ml-1">Month</label>
                        <input type="number" name="month" min="1" max="12" placeholder="12" required
                            class="input-field w-full px-5 py-3 rounded-xl text-on-background">
                    </div>
                    <!-- Day -->
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2 ml-1">Day</label>
                        <input type="number" name="day" min="1" max="31" placeholder="31" required
                            class="input-field w-full px-5 py-3 rounded-xl text-on-background">
                    </div>
                </div>

                <!-- Event Details -->
                <div>
                    <label class="block text-sm font-bold text-primary mb-2 ml-1">Event Description</label>
                    <textarea name="events" rows="4" placeholder="Describe what happened in detail..." required
                        class="input-field w-full px-5 py-3 rounded-xl text-on-background resize-none"></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="neu-button w-full py-4 text-white font-bold rounded-xl uppercase tracking-widest hover:opacity-90 transition-all">
                    Submit Entry
                </button>
            </form>

            <!-- Status Message -->
            <div id="statusMessage" class="hidden mt-6 text-center font-medium"></div>
        </div>

        <!-- Google Sheet Link Section -->
        <div class="mt-16 text-center">
            <p class="text-on-surface-variant mb-6">You can visit the google sheet here</p>
            <a href="YOUR_GOOGLE_SHEET_URL_HERE" target="_blank" 
                class="neu-flat inline-flex items-center gap-3 px-8 py-4 rounded-2xl text-primary font-bold hover:scale-105 transition-transform">
                <span class="material-symbols-outlined text-green-600">table_chart</span>
                <span>Demo Company Ltd. Google Sheet</span>
            </a>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzfVrOb0TgVSDOzryVKsTx2-Fo18uAL_cYMeAHxb33vJ5zpUvNDlvmbCFK0f7FIMAgO/exec'; // Replace with your App Script URL
        const form = document.getElementById('eventForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'Submitting...';
            statusMsg.classList.remove('hidden', 'text-green-600', 'text-red-600');
            statusMsg.innerText = 'Sending data to sheet...';
            statusMsg.classList.add('block', 'text-primary');

            const formData = new FormData(form);
            
            fetch(scriptURL, { method: 'POST', body: formData})
                .then(response => {
                    statusMsg.innerText = 'Success! Your event has been recorded.';
                    statusMsg.classList.replace('text-primary', 'text-green-600');
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit Entry';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    statusMsg.innerText = 'Error: Could not save data. Please try again.';
                    statusMsg.classList.replace('text-primary', 'text-red-600');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit Entry';
                });
        });
    </script>
</body>
</html>
