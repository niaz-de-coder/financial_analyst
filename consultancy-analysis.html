<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Consultancy Analysis | Demo Company Ltd.</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background: #f7f9ff; color: #131d25; }
        .neu-card { background: #f7f9ff; box-shadow: 8px 8px 16px #d1dbe7, -8px -8px 16px #ffffff; }
        .neu-pressed { background: #f7f9ff; box-shadow: inset 6px 6px 12px #d1dbe7, inset -6px -6px 12px #ffffff; }
        
        .analysis-box {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .analysis-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <!-- Navigation -->
        <div class="flex items-center justify-between mb-12">
            <a href="accounting.html" class="neu-card px-6 py-3 rounded-full flex items-center gap-2 text-[#5c5f61] font-bold hover:scale-105 transition-transform">
                <span class="material-symbols-outlined">arrow_back</span> Accounting
            </a>
            <div class="text-right">
                <h1 class="text-2xl font-bold text-[#5c5f61]">AI Consultancy</h1>
                <p class="text-xs text-[#505f76] font-bold uppercase tracking-widest">Powered by Niaz Empirez</p>
            </div>
        </div>

        <!-- Hero Section -->
        <div class="text-center mb-16">
            <div class="inline-flex p-4 rounded-full neu-pressed mb-6">
                <span class="material-symbols-outlined text-primary text-4xl">psychology</span>
            </div>
            <h2 class="text-3xl font-bold text-[#131d25] mb-4">Business Strategic Analysis</h2>
            <p class="text-[#505f76] text-lg">Here is your detailed analysis in simple language</p>
        </div>

        <!-- Analysis Container -->
        <div id="analysis-container" class="space-y-8">
            <!-- Loader -->
            <div id="ai-loader" class="text-center py-20">
                <p class="text-[#505f76] font-bold uppercase tracking-[0.2em] loading-dots">AI analyzing financial statements</p>
            </div>
        </div>

        <!-- Footer Note -->
        <div id="analysis-footer" class="hidden mt-20 text-center border-t border-[#d1dbe7] pt-10">
            <p class="text-xs text-[#505f76] italic">Note: This analysis is generated by the AI Accounting Library based on live spreadsheet data.</p>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyMlA6Wi7Dd80Dg08va6TOsWPCJ16SoXPBBYh_bK-xV7kHw0V4CAmh-4EWRqk14X9o/exec';

        async function startAnalysis() {
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                
                // Remove loader
                document.getElementById('ai-loader').remove();
                
                // Generate AI interpretation
                const reports = generateAIInsights(data);
                
                // Display one by one
                displayReports(reports);

            } catch (error) {
                console.error('Analysis failed:', error);
                document.getElementById('ai-loader').innerHTML = `
                    <div class="text-red-500 font-bold p-6 neu-card rounded-2xl">
                        AI could not connect to the data source. Please verify Apps Script deployment.
                    </div>
                `;
            }
        }

        function generateAIInsights(data) {
            const insights = [];

            // 1. Overall Health (Revenue vs Expense)
            const rev = parseFloat(data.revenue.replace(/[^0-9.-]+/g,"")) || 0;
            const exp = parseFloat(data.expense.replace(/[^0-9.-]+/g,"")) || 0;
            const net = rev - exp;
            
            insights.push({
                title: "Financial Performance Overview",
                icon: "monitoring",
                text: net > 0 
                    ? `Your business is currently profitable. With a revenue of ${data.revenue} and expenses at ${data.expense}, you are retaining a net positive margin. This suggests your core operations are sustainable.`
                    : `Alert: Your current expenses (${data.expense}) are exceeding or tightly matching your revenue (${data.revenue}). Immediate cost optimization or revenue scaling is required to avoid capital erosion.`
            });

            // 2. Liquidity Analysis (Current Ratio / Quick Ratio)
            const cr = parseFloat(data.currentRatio) || 0;
            insights.push({
                title: "Liquidity & Cash Flow",
                icon: "water_drop",
                text: cr > 1.5 
                    ? `Excellent liquidity position. A current ratio of ${cr} means you have more than enough short-term assets to cover every dollar of debt. You are in a strong position to invest in new opportunities.`
                    : `Caution on Liquidity. Your ratio of ${cr} suggests a tight cash position. You might face challenges if all short-term liabilities were called at once. Focus on faster debt collection (AR) or reducing short-term debt.`
            });

            // 3. Efficiency (Net Profit Margin)
            const npm = parseFloat(data.netProfitMargin) || 0;
            insights.push({
                title: "Operational Efficiency",
                icon: "settings_suggest",
                text: npm > 15 
                    ? `High efficiency! Converting ${npm}% of sales into pure profit is above industry standards. Your management of operational costs is highly effective.`
                    : `Operational margins are currently at ${npm}%. This indicates that a large portion of your revenue is being consumed by overheads. Review your variable costs and supplier contracts.`
            });

            // 4. Solvency (Debt to Equity)
            const de = parseFloat(data.debtToEquity) || 0;
            insights.push({
                title: "Debt & Risk Profile",
                icon: "shield",
                text: de < 1 
                    ? `Your business is largely equity-funded with a debt-to-equity of ${de}. This is a low-risk profile, making you very attractive to lenders or investors should you wish to expand.`
                    : `The business is heavily leveraged (Debt/Equity: ${de}). While debt can fuel growth, you are vulnerable to interest rate hikes. Consider rebalancing by increasing share capital or paying down long-term loans.`
            });

            // 5. Final Strategic Recommendation (CA Logic)
            const roe = parseFloat(data.roe) || 0;
            insights.push({
                title: "Strategic Recommendation",
                icon: "stars",
                text: roe > 10 
                    ? `Based on a ${roe}% Return on Equity, our recommendation is to SCALE. The business is proving it can multiply owner value. Explore "Fixed Asset" acquisition to build long-term wealth.`
                    : `Recommendation: STABILIZE. Focus on the "Income Statement" rather than expansion. Improve your asset turnover before committing to more "Fixed Assets" or "Long Term Liabilities".`
            });

            return insights;
        }

        function displayReports(reports) {
            const container = document.getElementById('analysis-container');
            const footer = document.getElementById('analysis-footer');
            
            reports.forEach((report, index) => {
                setTimeout(() => {
                    const box = document.createElement('div');
                    box.className = 'analysis-box neu-card p-8 rounded-3xl border-l-4 border-primary';
                    box.innerHTML = `
                        <div class="flex gap-6 items-start">
                            <div class="p-3 neu-pressed rounded-2xl">
                                <span class="material-symbols-outlined text-primary">${report.icon}</span>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-[#131d25] mb-3">${report.title}</h3>
                                <p class="text-[#505f76] leading-relaxed">${report.text}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(box);
                    
                    // Trigger animation
                    setTimeout(() => box.classList.add('visible'), 50);

                    // Show footer on last item
                    if (index === reports.length - 1) {
                        setTimeout(() => footer.classList.remove('hidden'), 1000);
                    }
                }, index * 800); // 800ms delay between boxes for "AI thinking" feel
            });
        }

        window.onload = startAnalysis;
    </script>
</body>
</html>
